services:
  postgres:
    image: postgres:17-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=daydesk
      - POSTGRES_PASSWORD=daydesk
      - POSTGRES_DB=daydesk
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
      - /app/node_modules
    command: sh -c "npm install && npx prisma generate && npx prisma migrate dev && npm run dev"
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    environment:
      - DATABASE_URL=postgresql://daydesk:daydesk@postgres:5432/daydesk
      - APP_BASE_URL=http://localhost:3000
      - NEXTAUTH_URL=http://localhost:3000
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - OAUTH_ISSUER=${OAUTH_ISSUER}
      - OAUTH_CLIENT_ID=${OAUTH_CLIENT_ID}
      - OAUTH_CLIENT_SECRET=${OAUTH_CLIENT_SECRET}
      - OAUTH_LOGOUT_URL=${OAUTH_LOGOUT_URL:-}
      - VAPID_PUBLIC_KEY=${VAPID_PUBLIC_KEY}
      - VAPID_PRIVATE_KEY=${VAPID_PRIVATE_KEY}
      - VAPID_SUBJECT=${VAPID_SUBJECT:-mailto:dev@localhost}
      - PUSH_API_SECRET=${PUSH_API_SECRET:-dev-secret}
      - LOG_LEVEL=${LOG_LEVEL:-debug}

volumes:
  pgdata:
