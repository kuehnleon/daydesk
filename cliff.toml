# git-cliff configuration
# https://git-cliff.org/docs/configuration

[changelog]
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.1.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

body = """
{%- if version %}
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else -%}
## [Unreleased]
{% endif -%}

{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}
- {{ commit.message | split(pat="\n") | first | upper_first }}\
{% endfor %}
{% endfor %}
"""

footer = """
{%- for release in releases -%}
    {%- if release.version -%}
        {%- if release.previous.version %}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/kuehnleon/daydesk/compare/{{ release.previous.version }}...{{ release.version }}
        {%- else %}
[{{ release.version | trim_start_matches(pat="v") }}]: https://github.com/kuehnleon/daydesk/releases/tag/{{ release.version }}
        {%- endif -%}
    {%- endif -%}
{%- endfor %}
"""

trim = true

[git]
conventional_commits = true
filter_unconventional = false
split_commits = false
protect_breaking_commits = false
filter_commits = false
topo_order = false
sort_commits = "oldest"

commit_parsers = [
    { message = "^feat", group = "Added" },
    { message = "^fix", group = "Fixed" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Changed" },
    { message = "^style", group = "Changed" },
    { message = "^docs", group = "Documentation" },
    { message = "^test", group = "Testing" },
    { message = "^chore", group = "Miscellaneous" },
    { message = "^revert", group = "Reverted" },
    # skip release commits and dependabot bumps
    { message = "^release", skip = true },
    { message = "^Bump ", skip = true },
    { message = "^Merge ", skip = true },
]
