apiVersion: v1
kind: Namespace
metadata:
  name: daydesk
---
apiVersion: v1
kind: Secret
metadata:
  name: daydesk-secret
  namespace: daydesk
type: Opaque
stringData:
  AUTH0_SECRET: "CHANGE_ME_GENERATE_WITH_openssl_rand_hex_32"
  AUTH0_CLIENT_ID: "CHANGE_ME"
  AUTH0_CLIENT_SECRET: "CHANGE_ME"
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: daydesk-pvc
  namespace: daydesk
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: daydesk
  namespace: daydesk
  labels:
    app: daydesk
spec:
  replicas: 1
  selector:
    matchLabels:
      app: daydesk
  template:
    metadata:
      labels:
        app: daydesk
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init-db
          image: ghcr.io/kuehnleon/daydesk:latest
          command: ['node', 'node_modules/prisma/build/index.js', 'migrate', 'deploy']
          env:
            - name: DATABASE_URL
              value: "file:/data/daydesk.db"
          volumeMounts:
            - name: data
              mountPath: /data
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      containers:
        - name: daydesk
          image: ghcr.io/kuehnleon/daydesk:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "file:/data/daydesk.db"
            - name: APP_BASE_URL
              value: "https://daydesk.deskcode.de"
            - name: NEXTAUTH_URL
              value: "https://daydesk.deskcode.de"
            - name: AUTH0_DOMAIN
              value: "CHANGE_ME.auth0.com"
          envFrom:
            - secretRef:
                name: daydesk-secret
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: daydesk-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: daydesk
  namespace: daydesk
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: daydesk
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: daydesk
  namespace: daydesk
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  rules:
    - host: daydesk.deskcode.de
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: daydesk
                port:
                  number: 80
  tls:
    - hosts:
        - daydesk.deskcode.de
      secretName: daydesk-tls
