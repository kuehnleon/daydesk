<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 370 110" width="370" height="110">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5c7cfa"/>
      <stop offset="100%" stop-color="#4C6EF5"/>
    </linearGradient>
  </defs>

  <!-- Icon: minimal calendar -->
  <rect x="9" y="20" width="80" height="76" rx="14" fill="url(#g)"/>
  <rect x="19" y="40" width="60" height="46" rx="6" fill="#1e1e22"/>
  <rect x="29" y="8" width="12" height="24" rx="4" fill="url(#g)"/>
  <rect x="57" y="8" width="12" height="24" rx="4" fill="url(#g)"/>

  <!-- Calendar dots (today indicator) -->
  <circle cx="37" cy="55" r="4" fill="#3a3a40"/>
  <circle cx="57" cy="55" r="4" fill="#3a3a40"/>
  <circle cx="37" cy="72" r="4" fill="#3a3a40"/>
  <circle cx="57" cy="72" r="5.5" fill="url(#g)"/>

  <!-- Wordmark -->
  <text x="104" y="82" font-family="-apple-system, 'SF Pro Display', 'Inter', 'Helvetica Neue', Arial, sans-serif" font-size="68" font-weight="700" letter-spacing="-2.5">
    <tspan fill="#ececec">day</tspan><tspan fill="url(#g)">desk</tspan>
  </text>
</svg>
