<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#3B5BDB" />
  <title>daydesk — Offline</title>
  <style>
    :root {
      --background: #fafafa;
      --surface-primary: #ffffff;
      --border-default: #e8e5e1;
      --accent: #3B5BDB;
      --text-primary: #1a1a1a;
      --text-secondary: #6b6b6b;
      --shadow-sm: 0 1px 3px rgba(0,0,0,0.06), 0 1px 2px rgba(0,0,0,0.04);
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --background: #161618;
        --surface-primary: #1e1e20;
        --border-default: #2e2e32;
        --accent: #5c7cfa;
        --text-primary: #ececec;
        --text-secondary: #a0a0a0;
        --shadow-sm: 0 1px 3px rgba(0,0,0,0.3), 0 1px 2px rgba(0,0,0,0.2);
      }
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--background);
      color: var(--text-primary);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 0px) env(safe-area-inset-right, 16px) env(safe-area-inset-bottom, 0px) env(safe-area-inset-left, 16px);
    }
    .container {
      text-align: center;
      max-width: 360px;
      background: var(--surface-primary);
      border: 1px solid var(--border-default);
      border-radius: 12px;
      box-shadow: var(--shadow-sm);
      padding: 40px 24px;
    }
    .icon {
      margin-bottom: 20px;
    }
    .icon svg {
      width: 48px;
      height: 48px;
      stroke: var(--text-secondary);
    }
    h1 {
      font-size: 20px;
      font-weight: 600;
      margin-bottom: 8px;
    }
    p {
      font-size: 15px;
      color: var(--text-secondary);
      line-height: 1.5;
      margin-bottom: 24px;
    }
    button {
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 15px;
      font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    button:active {
      opacity: 0.85;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M8.288 15.038a5.25 5.25 0 0 1 7.424 0M5.106 11.856c3.807-3.808 9.98-3.808 13.788 0M1.924 8.674c5.565-5.565 14.587-5.565 20.152 0M12 18.75h.008v.008H12v-.008Z" />
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 3l18 18" stroke-width="2" />
      </svg>
    </div>
    <h1>You're offline</h1>
    <p>daydesk needs an internet connection for the first load. Please check your connection and try again.</p>
    <button onclick="window.location.reload()">Try again</button>
  </div>
</body>
</html>
