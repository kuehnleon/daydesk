replicaCount: 1

image:
  repository: daydesk
  pullPolicy: IfNotPresent
  tag: "latest"

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  host: daydesk.example.com
  tls:
    enabled: false
    secretName: daydesk-tls

persistence:
  enabled: true
  storageClass: ""
  accessMode: ReadWriteOnce
  size: 1Gi
  mountPath: /data

env:
  DATABASE_URL: "file:/data/daydesk.db"
  APP_BASE_URL: "http://localhost:3000"
  NEXTAUTH_URL: "http://localhost:3000"
  AUTH0_DOMAIN: ""
  AUTH0_CLIENT_ID: ""
  AUTH0_CLIENT_SECRET: ""
  AUTH0_SECRET: ""

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi
