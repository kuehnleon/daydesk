{{- if not .Values.postgres.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daydesk.postgresSecretName" . }}
  labels:
    {{- include "daydesk.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.postgres.databaseUrl | quote }}
  DIRECT_URL: {{ (.Values.postgres.directUrl | default .Values.postgres.databaseUrl) | quote }}
{{- end }}
