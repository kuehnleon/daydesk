apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "daydesk.fullname" . }}
  labels:
    {{- include "daydesk.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      {{- include "daydesk.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "daydesk.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "daydesk.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      {{- if .Values.initContainer.enabled }}
      initContainers:
        - name: prisma-migrate
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: ['node', 'node_modules/prisma/build/index.js', 'migrate', 'deploy']
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.postgresSecretName" . }}
                  key: database-url
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.postgresSecretName" . }}
                  key: {{ if or .Values.postgres.directUrl .Values.postgres.existingSecret }}direct-url{{ else }}database-url{{ end }}
                  {{- if .Values.postgres.existingSecret }}
                  optional: true
                  {{- end }}
      {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "daydesk.fullname" . }}-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.postgresSecretName" . }}
                  key: database-url
            - name: DIRECT_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.postgresSecretName" . }}
                  key: {{ if or .Values.postgres.directUrl .Values.postgres.existingSecret }}direct-url{{ else }}database-url{{ end }}
                  {{- if .Values.postgres.existingSecret }}
                  optional: true
                  {{- end }}
            - name: NEXTAUTH_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.oauthSecretName" . }}
                  key: nextauth-secret
            - name: OAUTH_ISSUER
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.oauthSecretName" . }}
                  key: oauth-issuer
            - name: OAUTH_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.oauthSecretName" . }}
                  key: oauth-client-id
            - name: OAUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.oauthSecretName" . }}
                  key: oauth-client-secret
            {{- if .Values.pushNotifications.enabled }}
            - name: VAPID_PUBLIC_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.vapidSecretName" . }}
                  key: vapid-public-key
            - name: VAPID_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.vapidSecretName" . }}
                  key: vapid-private-key
            - name: VAPID_SUBJECT
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.vapidSecretName" . }}
                  key: vapid-subject
            - name: PUSH_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "daydesk.vapidSecretName" . }}
                  key: push-api-secret
            {{- end }}
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
