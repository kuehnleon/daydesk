{{- if and .Values.pushNotifications.enabled (not .Values.vapid.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "daydesk.vapidSecretName" . }}
  labels:
    {{- include "daydesk.labels" . | nindent 4 }}
type: Opaque
stringData:
  VAPID_PUBLIC_KEY: {{ .Values.vapid.publicKey | quote }}
  VAPID_PRIVATE_KEY: {{ .Values.vapid.privateKey | quote }}
  VAPID_SUBJECT: {{ .Values.vapid.subject | quote }}
  PUSH_API_SECRET: {{ .Values.vapid.pushApiSecret | quote }}
{{- end }}
