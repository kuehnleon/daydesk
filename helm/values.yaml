# Default values for daydesk.

replicaCount: 1

image:
  repository: ghcr.io/kuehnleon/daydesk
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: daydesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: daydesk-tls
  #    hosts:
  #      - daydesk.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

startupProbe:
  httpGet:
    path: /api/health
    port: http
  failureThreshold: 30
  periodSeconds: 2

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# -- Public URL of the application (used for APP_BASE_URL and NEXTAUTH_URL)
appUrl: "http://localhost:3000"

# -- OAuth / OIDC secret configuration (works with any OIDC provider: Auth0, Keycloak, Okta, Azure AD, etc.)
# If existingSecret is set, no OAuth Secret resource is created.
# The existing secret must contain keys: oauth-issuer, nextauth-secret, oauth-client-id, oauth-client-secret
oauth:
  existingSecret: ""
  issuer: ""            # OIDC issuer URL (e.g. https://your-tenant.auth0.com)
  clientId: ""
  clientSecret: ""
  nextauthSecret: ""    # random secret for NextAuth.js JWT signing
  logoutUrl: ""         # optional RP-initiated logout URL

# -- Postgres secret configuration
# Provide databaseUrl to create a managed secret, or set existingSecret to reference a pre-created one.
# The existing secret must contain the key: database-url (and optionally: direct-url)
# directUrl is for connection poolers (e.g. Supabase/PgBouncer) where Prisma needs a
# direct connection for migrations while the app uses the pooled connection.
postgres:
  existingSecret: ""
  databaseUrl: ""
  directUrl: ""

# -- Prisma database migration init container
initContainer:
  enabled: true

# -- VAPID configuration for Web Push notifications
# If existingSecret is set, no VAPID Secret resource is created.
# The existing secret must contain keys: vapid-public-key, vapid-private-key, vapid-subject, push-api-secret
vapid:
  existingSecret: ""
  publicKey: ""
  privateKey: ""
  subject: ""              # mailto:admin@example.com
  pushApiSecret: ""

# -- Push notification CronJob (requires vapid keys to be configured)
pushNotifications:
  enabled: false
