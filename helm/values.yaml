# Default values for daydesk.

replicaCount: 1

image:
  repository: ghcr.io/kuehnleon/daydesk
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: false
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
    - ALL
  runAsNonRoot: true
  runAsUser: 1000

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: "nginx"
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: daydesk.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: daydesk-tls
  #    hosts:
  #      - daydesk.example.com

resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 100m
    memory: 128Mi

startupProbe:
  httpGet:
    path: /api/health
    port: http
  failureThreshold: 30
  periodSeconds: 2

livenessProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/health
    port: http
  periodSeconds: 5

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

nodeSelector: {}

tolerations: []

affinity: {}

# -- Public URL of the application (used for APP_BASE_URL and NEXTAUTH_URL in the ConfigMap)
appUrl: "http://localhost:3000"

# -- Non-secret environment variables (loaded via ConfigMap)
# Add any custom env vars here; they will be injected into the container.
env:
  NEXT_PUBLIC_SKELETON_MIN_MS: "300"
  LOG_LEVEL: "info"
  # OAUTH_LOGOUT_URL: ""   # optional — set if your OIDC provider supports RP-initiated logout

# -- OAuth / OIDC secret configuration (works with any OIDC provider: Auth0, Keycloak, Okta, Azure AD, etc.)
# If existingSecret is set, no OAuth Secret resource is created.
# The existing secret must contain keys: NEXTAUTH_SECRET, OAUTH_ISSUER, OAUTH_CLIENT_ID, OAUTH_CLIENT_SECRET
# Optional key: OAUTH_LOGOUT_URL
oauth:
  existingSecret: ""
  issuer: ""            # OIDC issuer URL (e.g. https://your-tenant.auth0.com)
  clientId: ""
  clientSecret: ""
  nextauthSecret: ""    # random secret for NextAuth.js JWT signing
  logoutUrl: ""         # optional RP-initiated logout URL

# -- Postgres secret configuration
# Provide databaseUrl to create a managed secret, or set existingSecret to reference a pre-created one.
# The existing secret must contain the key: DATABASE_URL (and optionally: DIRECT_URL)
# DIRECT_URL is for connection poolers (e.g. Supabase/PgBouncer) where Prisma needs a
# direct connection for migrations while the app uses the pooled connection.
postgres:
  existingSecret: ""
  databaseUrl: ""
  directUrl: ""

# -- Prisma database migration init container
initContainer:
  enabled: true

# -- VAPID configuration for Web Push notifications
# If existingSecret is set, no VAPID Secret resource is created.
# The existing secret must contain keys: VAPID_PUBLIC_KEY, VAPID_PRIVATE_KEY, VAPID_SUBJECT, PUSH_API_SECRET
vapid:
  existingSecret: ""
  publicKey: ""
  privateKey: ""
  subject: ""              # mailto:admin@example.com
  pushApiSecret: ""

# -- Push notification CronJob (requires vapid keys to be configured)
pushNotifications:
  enabled: false
